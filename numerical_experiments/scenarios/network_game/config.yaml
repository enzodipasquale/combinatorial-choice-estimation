# ============================================================
# Network peer-effects game (Graham and Gonzalez 2023, Panel B).
#
# Single game (N = 1), T players, binary action y_t in {0, 1}. Player t's
# payoff is
#     v_t(y) = y_t * ( x_t' beta + delta * sum_{s != t} D_ts y_s - U_t ).
# D is the symmetric binary adjacency of a random geometric graph with
# probabilistic edge formation (paper Appendix B: each within-radius pair
# links with probability 0.75, so E[deg] = 0.75 * pi * r^2). X is held
# fixed across replications and U is drawn fresh per rep.
# ============================================================

dgp:
  T: 500                                    # number of players
  beta: [-1.0, -0.5, -1.0, 0.5]             # paper's true beta
  delta_true: 0.20                          # paper's true delta
  avg_degree: 10                            # target E[deg] in the graph
  # r = sqrt(avg_degree / (0.75 * pi))      # paper, Appendix B
  # U_t ~ N(0, 1); X_1, X_2 ~ Bern(0.5); X_3, X_4 ~ U[0, 1]

seeds:
  graph: 20260423                           # fixes (X, D) across reps
  mc_base: 1000                             # rep i uses shock_seed = mc_base + i

estimation:
  # combest row generation (see monte_carlo.py). SML settings are
  # separately overridden on the paper_sml/monte_carlo_sml.py CLI.
  n_simulations: 50                         # combest counterfactual error draws
  max_iters: 500
  tolerance: 1.0e-6
  theta_bounds:                             # delta must be >= 0 (supermodular)
    lb: -5.0
    ub: 5.0
    lbs: {4: 0.0}

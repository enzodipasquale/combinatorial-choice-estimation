dgp:
  L1: 10
  L2: 12
  N: 24
  n_firms: 25
  models_range: [4, 8]
  cell_groups_range: [1, 2]
  max_platforms: 5
  min_platforms: 2
  feasibility:
    global_range: [10, 12]
    regional_range: [4, 10]
    global_prob: 0.5

theta_true:
  delta_1: 2.0
  delta_2: 2.5
  rho_xi_1: 1.0
  rho_xi_2: 1.0
  rho_HQ_1: 1.0
  rho_HQ_2: 1.0
  FE_1_r1: 0.5
  FE_1_r2: 0.2
  FE_2_r1: 0.3
  FE_2_r2: 0.2
  rho_d_1: 0.6
  rho_d_2: 0.3

sigma:
  phi: 0.3
  nu: 0.3

estimation:
  n_simulations: 1
  max_iters: 200
  tolerance: 1.0e-6
  gurobi_timeout_schedule:
    - iters: 20
      timeout: 1
      retire: false
    - iters: 2
      timeout: 10
      retire: false
    - timeout: 60
      retire: true

monte_carlo:
  seed: 42
  n_replications: 1

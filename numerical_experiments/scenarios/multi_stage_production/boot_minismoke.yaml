# Mini smoke test: small problem to verify S>1 + bootstrap pipeline end-to-end in minutes.
# NOT for paper results. Only validates that no crashes occur at S>1.

dgp:
  L1: 4
  L2: 5
  N: 8
  n_firms: 6
  models_range: [2, 3]
  cell_groups_range: [1, 1]
  max_platforms: 2
  min_platforms: 1
  feasibility:
    global_range: [5, 6]
    regional_range: [3, 5]
    global_prob: 0.5

theta_true:
  delta_1: 2.0
  delta_2: 2.5
  rho_xi_1: 1.0
  rho_xi_2: 1.0
  rho_HQ_1: 1.0
  rho_HQ_2: 1.0
  FE_1_r1: 0.5
  FE_1_r2: 0.2
  FE_2_r1: 0.3
  FE_2_r2: 0.2
  rho_d_1: 0.6
  rho_d_2: 0.3

sigma:
  phi: 0.3
  nu: 0.3

estimation:
  n_simulations: 2
  max_iters: 30
  tolerance: 1.0e-3

monte_carlo:
  seed: 42

bootstrap:
  num_samples: 3
  seed: 7777
  rowgen_tol: 0.01
  rowgen_max_iters: 20

callbacks:
  row_gen:
    - {iters: 10, timeout: 1}
    - {timeout: 5, retire: true}
  boot:
    - {iters: 10, timeout: 1}
    - {iters: 10, timeout: 3, retire: true}
  boot_strip:
    percentile: 95
    hard_threshold: 5000

application:
    dataset: c_block
    item_modular: fe
    mode: bootstrap
    error_seed: 2006
    capacity_mode: round
    capacity_seed: 42
    modular_regressors:
        - elig_pop
        - assets_pop
        - log_dist_hq
        - elig_log_dist_hq
        - log_dist_hq_pop
        - elig_log_dist_hq_pop
    quadratic_regressors:
        - adjacency
        - pop_centroid_delta4
        - pop_centroid_00
        - air_travel
        - travel_survey
    quadratic_id_regressors:
        - elig_adjacency
        - elig_pop_centroid_delta4
        - elig_pop_centroid_00
        - elig_air_travel
        - elig_travel_survey
dimensions:
    n_simulations: 20
subproblem:
    name: QuadraticKnapsackGRB
    gurobi_params:
        TimeLimit: 1.0

row_generation:
    max_iters: 100
    tolerance: .01
    master_gurobi_params:
        Method: 0
    theta_bounds:
        lb: -20000
        ub: 200000
        lbs:
            elig_pop: -200000
            assets_pop: -200000
            log_dist_hq: -200000
            elig_log_dist_hq: -20000
            log_dist_hq_pop: -20000
            elig_log_dist_hq_pop: -20000
            adjacency: -20000
            pop_centroid_delta4: -20000
            pop_centroid_00: -20000
            air_travel: -30000
            travel_survey: -30000
            elig_adjacency: -20000
            elig_pop_centroid_delta4: -30000
            elig_pop_centroid_00: -20000
            elig_air_travel: -20000
            elig_travel_survey: -20000
        ubs:
            elig_pop: 30000

bootstrap:
    num_samples: 100
    seed: 1233
    rowgen_tol: 0.001
    rowgen_max_iters: 270

callbacks:
    row_gen:
        - {iters: 50, timeout: 1.0}
        - {timeout: 5.0, retire: true}
    boot:
        - {iters: 10, timeout: 1.0}
        - {iters: 2, timeout: 5.0, retire: true}
        - {iters: 10, timeout: 1.0}
        - {iters: 2, timeout: 5.0, retire: true}
        - {iters: 10, timeout: 1.0}
        - {iters: 20, timeout: 1.0, retire: true}
        - {iters: 20, timeout: 1.0, retire: true}
        - {iters: 2, timeout: 5.0, retire: true}
        - {iters: 20, timeout: 1.0, retire: true}
        - {iters: 2, timeout: 5.0, retire: true}
        - {iters: 20, timeout: 1.0, retire: true}
        - {iters: 2, timeout: 5.0, retire: true}
        - {iters: 20, timeout: 1.0, retire: true}
        - {iters: 2, timeout: 5.0, retire: true}

    boot_strip:
        percentile: 95
        hard_threshold: 5000

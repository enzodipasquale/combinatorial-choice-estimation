application:
    dataset: c_block
    item_modular: fe
    mode: estimation
    error_seed: 2006
    modular_regressors:
        - elig_pop
    quadratic_regressors:
        - adjacency
        - pop_centroid_delta4
    quadratic_id_regressors:
        - elig_adjacency
dimensions:
    n_simulations: 2
subproblem:
    name: QuadraticKnapsackGRB
    gurobi_params:
        TimeLimit: 1.0

row_generation:
    max_iters: 10
    tolerance: .05
    master_gurobi_params:
        Method: 0
    theta_bounds:
        lb: -200
        ub: 2000
        lbs:
            elig_pop: -2000
            adjacency: -2000
            pop_centroid_delta4: -2000
            elig_adjacency: -2000
        ubs:
            elig_pop: 3000

callbacks:
    row_gen:
        - {iters: 10, timeout: 1.0, retire: true}

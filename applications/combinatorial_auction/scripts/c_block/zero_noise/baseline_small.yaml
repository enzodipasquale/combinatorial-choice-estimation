application:
    dataset: c_block
    item_modular: fe
    error_mode: elig_pop
    quadratic_regressors:
        - adjacency
        - pop_centroid_delta4
    quadratic_id_regressors:
        - elig_adjacency
dimensions:
    n_simulations: 1
subproblem:
    name: QuadraticKnapsackGRB
    gurobi_params:
        TimeLimit: 1.0

row_generation:
    max_iters: 200
    tolerance: .01
    master_gurobi_params:
        Method: 0
    theta_bounds:
        lb: -200
        ub: 2000
        lbs:
            adjacency: -2000
            pop_centroid_delta4: -2000
            elig_adjacency: -2000
        ubs: {}

callbacks:
    row_gen:
        - {iters: 50, timeout: 1.0}
        - {timeout: 5.0, retire: true}

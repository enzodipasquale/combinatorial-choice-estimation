application:
    dataset: c_block
    item_modular: fe
    error_mode: elig_pop
    winners_only: true
    capacity_source: last_round
    quadratic_regressors:
        - adjacency
        - pop_centroid_delta4
        - air_travel
        - travel_survey
    quadratic_id_regressors: []
dimensions:
    n_simulations: 1
subproblem:
    name: QuadraticKnapsackGRB
    gurobi_params:
        TimeLimit: 1.0

row_generation:
    max_iters: 200
    tolerance: 1e-6
    master_gurobi_params:
        Method: 0
    theta_bounds:
        lb: -200
        ub: 2000
        lbs:
            adjacency: -2000
            pop_centroid_delta4: -2000
            air_travel: -3000
            travel_survey: -3000
        ubs: {}

callbacks:
    row_gen:
        - {iters: 50, timeout: 1.0}
        - {timeout: 5.0, retire: true}

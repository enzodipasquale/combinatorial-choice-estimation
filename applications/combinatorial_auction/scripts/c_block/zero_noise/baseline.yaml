application:
    dataset: c_block
    item_modular: fe
    error_mode: elig_pop
    modular_regressors:
        - assets_pop
        - log_dist_hq
        - elig_log_dist_hq
        - log_dist_hq_pop
        - elig_log_dist_hq_pop
    quadratic_regressors:
        - adjacency
        - pop_centroid_delta4
        - pop_centroid_00
        - air_travel
        - travel_survey
    quadratic_id_regressors:
        - elig_adjacency
        - elig_pop_centroid_delta4
        - elig_pop_centroid_00
        - elig_air_travel
        - elig_travel_survey
dimensions:
    n_simulations: 1
subproblem:
    name: QuadraticKnapsackGRB
    gurobi_params:
        TimeLimit: 1.0

row_generation:
    max_iters: 200
    tolerance: .01
    master_gurobi_params:
        Method: 0
    theta_bounds:
        lb: -200
        ub: 2000
        lbs:
            assets_pop: -2000
            log_dist_hq: -2000
            elig_log_dist_hq: -2000
            log_dist_hq_pop: -2000
            elig_log_dist_hq_pop: -2000
            adjacency: -2000
            pop_centroid_delta4: -2000
            pop_centroid_00: -2000
            air_travel: -3000
            travel_survey: -3000
            elig_adjacency: -2000
            elig_pop_centroid_delta4: -3000
            elig_pop_centroid_00: -2000
            elig_air_travel: -2000
            elig_travel_survey: -2000
        ubs: {}

bootstrap:
    num_samples: 150
    seed: 1233
    rowgen_tol: 0.001
    rowgen_max_iters: 250

callbacks:
    row_gen:
        - {iters: 50, timeout: 1.0}
        - {timeout: 5.0, retire: true}
    boot:
        - {iters: 10, timeout: 1.0}
        - {iters: 2, timeout: 5.0, retire: true}
        - {iters: 10, timeout: 1.0}
        - {iters: 2, timeout: 5.0, retire: true}
        - {iters: 10, timeout: 1.0}
        - {iters: 20, timeout: 1.0, retire: true}
        - {iters: 20, timeout: 1.0, retire: true}
        - {iters: 2, timeout: 5.0, retire: true}
        - {iters: 20, timeout: 1.0, retire: true}
        - {iters: 2, timeout: 5.0, retire: true}
        - {iters: 20, timeout: 1.0, retire: true}
        - {iters: 2, timeout: 5.0, retire: true}
        - {iters: 20, timeout: 1.0, retire: true}
        - {iters: 2, timeout: 5.0, retire: true}

    boot_strip:
        percentile: 95
        hard_threshold: 5000

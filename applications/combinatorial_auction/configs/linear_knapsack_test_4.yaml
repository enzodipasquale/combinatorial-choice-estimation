# Linear-knapsack spec with n_simulations = 1 — sanity check vs ns=5.
application:
    mode: estimation
    error_seed: 2006
    error_scaling: pop
    sigma_price:    1.0
    rho_pop_price:  0.5
    modular_regressors:
        - elig_pop
        - elig_constant
        - elig_price
    quadratic_regressors:    []
    quadratic_id_regressors: []

dimensions:
    n_simulations: 5

subproblem:
    name: LinearKnapsackGRB
    gurobi_params:
        TimeLimit: 0.2

row_generation:
    max_iters: 100
    tolerance: .01
    master_gurobi_params:
        Method: 0
    theta_bounds:
        lb: -200
        ub: 2000
        lbs: {elig_pop: -2000}
        ubs: {elig_pop:  3000}

callbacks:
    row_gen:
        - {iters: 50, timeout: 0.2}
        - {timeout: 1.0, retire: true}

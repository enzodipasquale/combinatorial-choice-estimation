# Linear-knapsack spec with pop-scaled AND spatially-correlated errors (SAR).
# Σ = (I − ρW)⁻¹(I − ρW)⁻ᵀ over symmetrized, binarized, row-normalized BTA
# adjacency; then each draw is multiplied by pop_j. Goal: reduce the entropy
# share of surplus by making nearby BTAs' shocks co-move.
application:
    mode: estimation
    error_seed: 2006
    error_scaling: pop
    spatial_rho: 0.6
    modular_regressors:
        - elig_pop
    quadratic_regressors:    []
    quadratic_id_regressors: []

dimensions:
    n_simulations: 5

subproblem:
    name: LinearKnapsackGRB
    gurobi_params:
        TimeLimit: 0.2

row_generation:
    max_iters: 100
    tolerance: .01
    master_gurobi_params:
        Method: 0
    theta_bounds:
        lb: -200
        ub: 2000
        lbs: {elig_pop: -2000}
        ubs: {elig_pop:  3000}

callbacks:
    row_gen:
        - {iters: 50, timeout: 0.2}
        - {timeout: 1.0, retire: true}

experiment:
  n_replications: 50
  rho: 0.5
  sigma: 1.0
  beta_star: ones
  target_std: 0.5
  mle_draws: 500

specifications:
  gross_substitutes:
    subproblem: Greedy
    alpha: 1.0
    lambda:
      2: 0.1
      3: 0.05
      4: 0.02
  supermodular:
    subproblem: QuadraticSupermodularMinCut
    alpha: 1.0
    lambda:
      2: 0.1
      3: 0.05
      4: 0.02
  linear_knapsack:
    subproblem: LinearKnapsackGRB
    alpha: 1.0
  quadratic_knapsack:
    subproblem: QuadraticKnapsackGRB
    alpha: 1.0
    lambda: 0.05
    quadratic_density: 0.5

grid:
  J: [2, 3, 4]
  N: [100, 500, 1000]

row_generation:
  max_iters: 200
  tolerance: 0.01
  theta_bounds:
    lb: -100
    ub: 100

subproblem:
  gurobi_params:
    TimeLimit: 10.0
    OutputFlag: 0
    Threads: 1

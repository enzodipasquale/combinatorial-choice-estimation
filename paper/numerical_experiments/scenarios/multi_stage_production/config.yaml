dgp:
  L1: 12
  L2: 15
  N: 24
  n_firms: 15
  models_range: [4, 8]
  cell_groups_range: [1, 2]
  max_platforms: 5
  min_platforms: 2
  feasibility:
    global_range: [10, 12]
    regional_range: [4, 10]
    global_prob: 0.5

theta_true:
  delta_1: .5
  delta_2: 1.2
  rho_xi_1: 1.0
  rho_xi_2: 1.0
  rho_HQ_1: 1.2
  rho_HQ_2: 1.2
  FE_1_r1: 0.8    # Asia: strong cell advantage
  FE_1_r2: 0.3    # Europe: moderate cell advantage
  FE_2_r1: 0.4    # Asia: moderate assembly advantage
  FE_2_r2: 0.4    # Europe: moderate assembly advantage
  rho_d_1: 0.3
  rho_d_2: 0.3

sigma:
  phi: 0.3
  nu: 0.3

estimation:
  n_simulations: 1
  max_iters: 200
  tolerance: 1.0e-6
  gurobi_timeout_schedule:
    - iters: 20
      timeout: 1
      retire: false
    - iters: 2
      timeout: 10
      retire: false
    - timeout: 60
      retire: true

monte_carlo:
  seed: 42
  n_replications: 1

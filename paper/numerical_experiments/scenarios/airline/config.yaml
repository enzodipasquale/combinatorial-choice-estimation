dgp:
  C: 50                    # number of cities
  N: 30                    # number of airlines
  fe_mode: "none"          # "none" or "origin"
  sigma: 1.0               # std of modular errors nu_{ij}
  pop_log_std: 1.0         # std of log-population distribution
  hub_pool_frac: 0.33      # fraction of cities in the hub pool (biggest cities)
  min_hubs: 1              # min hubs per airline
  max_hubs: 5              # max hubs per airline

seeds:
  dgp: 42
  error: 1042
  search: 7

estimation:
  n_simulations: 1
  max_iters: 200
  tolerance: 1.0e-6
  gurobi_timeout: 30

healthy_dgp:
  max_candidates: 500
  theta_rev_range: [0.1, 3.0]   # gravity revenue coefficient (scaled by data)
  theta_fc_range: [0.1, 3.0]    # per-route fixed cost (scaled by sigma)
  theta_gs_range: [0.5, 5.0]    # hub congestion penalty
  min_mean_bundle_frac: 0.1
  max_mean_bundle_frac: 0.55
  min_frac_with_hub_routes: 0.5
  min_congestion_std: 0.1

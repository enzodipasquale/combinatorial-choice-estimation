# ============================================================
# Airline / Gross Substitutes scenario configuration
#
# Inspired by Bontemps, Gualdani & Remmy (2025):
# "Price Competition and Endogenous Product Choice in Networks"
#
# Utility for airline i choosing route bundle b:
#   V_i(b) = theta_rev * sum_j b_j * gravity_j
#            - theta_fc_i * sum_j b_j
#            - theta_gs * sum_{h in H_i} n_h^2
#            + sum_j b_j * nu_ij
#
# where gravity_j = pop_o * pop_d / dist_od
# ============================================================

# --- Data generating process ---
dgp:
  C: 50                    # number of cities (M = C*(C-1) directed routes)
  N: 10                    # number of airlines
  fe_mode: "none"          # "none" or "origin" (origin fixed effects)
  sigma: 1.0               # std of modular errors nu_{ij}
  pop_log_std: 1.0         # std of log-population (controls city-size spread)
  hub_pool_frac: 0.33      # fraction of cities eligible as hubs (biggest)
  min_hubs: 1              # min hubs per airline
  max_hubs: 5              # max hubs per airline

# --- Random seeds ---
seeds:
  dgp: 42                  # geography, populations, hubs
  error: 1042              # simulation errors (estimation)
  search: 7                # healthy-theta search
  bootstrap: 999            # bootstrap weight draws

# --- Estimation ---
estimation:
  n_simulations: 1          # S (simulation draws for estimator)
  max_iters: 200            # row generation max iterations
  tolerance: 1.0e-6         # row generation convergence tolerance
  gurobi_timeout: 30        # Gurobi TimeLimit (seconds)
  num_bootstrap: 100        # Bayesian bootstrap samples for SEs

# --- Healthy-DGP search ---
# True theta is found by random search over these ranges,
# checking that the generated bundles are informative.
healthy_dgp:
  max_candidates: 500       # max search trials before failure
  theta_rev_range: [0.1, 3.0]   # gravity revenue (scaled by data std)
  theta_fc_range: [0.1, 3.0]    # per-route fixed cost mean (scaled by sigma)
  theta_fc_dispersion: 0.3       # CV of firm-specific FCs around the mean
  theta_gs_range: [0.5, 5.0]    # hub congestion penalty
  min_mean_bundle_frac: 0.1      # min fraction of routes active (mean)
  max_mean_bundle_frac: 0.55     # max fraction of routes active (mean)
  min_frac_with_hub_routes: 0.5  # min share of airlines with hub-originating routes
  min_congestion_std: 0.1        # min std of congestion feature across airlines

# --- Replications ---
replications:
  n_reps: 30                # number of replications for SE computation

experiment:
  n_replications: 50
  rho: 0.5
  beta_star: ones
  debug_mode: false
  sigma: 1.0

specifications:
  gross_substitutes:
    subproblem: Greedy
    max_M: 200
    alpha: 0.1
    lambda:
      20: 0.005
      50: 0.002
      100: 0.002
      200: 0.002

  supermodular:
    subproblem: QuadraticSupermodularMinCut
    max_M: 200
    alpha: 0.1
    lambda:
      20: 0.01
      50: 0.005
      100: 0.001
      200: 0.001

  linear_knapsack:
    alpha: 0.1
    subproblem: LinearKnapsackGRB
    max_M: 200

  quadratic_knapsack:
    alpha: 0.1
    lambda: 0.05
    subproblem: QuadraticKnapsackGRB
    max_M: 50

grid:
  M: [50, 100, 200]
  N: [100, 500, 1000]
  debug_M: [20]
  debug_N: [200]

row_generation:
  max_iters: 200
  tolerance: 0.01
  theta_bounds:
    lb: -100
    ub: 100

subproblem:
  gurobi_params:
    TimeLimit: 10.0
    OutputFlag: 0
    Threads: 1

callbacks:
  row_gen:
    - {iters: 50, timeout: 1.0}
    - {timeout: 10.0, retire: true}
